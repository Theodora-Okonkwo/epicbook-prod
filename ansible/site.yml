---
- name: Prepare system (common)
  hosts: web
  become: true
  roles:
    - common

- name: Install Node.js and PM2
  hosts: web
  become: true
  roles:
    - nodejs

- name: Deploy EpicBook application
  hosts: web
  become: true
  roles:
    - epicbook

- name: Install and configure Nginx
  hosts: web
  become: true
  roles:
    - nginx
